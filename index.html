<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

  <title>Qurbani Run</title>

  <meta
    name="viewport"
    content="width=device-width, height=device-height, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <link rel="shortcut icon" href="TemplateData/favicon.ico" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      outline: none;
    }

    #unity-loading-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    #unity-loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #unity-loading-box {
      width: min(360px, 78vw);
      text-align: center;
    }

    #unity-title {
      margin-bottom: 18px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.02em;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.18);
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.08);
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: #fff;
      transition: width 0.15s ease;
    }

    #unity-loading-text {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(255, 255, 255, 0.78);
    }

    #unity-warning {
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 50%;
      z-index: 40;
      display: none;
      width: min(780px, calc(100vw - 24px));
      transform: translateX(-50%);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      pointer-events: none;
    }

    #unity-warning div {
      margin-bottom: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    #unity-warning .error {
      background: #ff3b30;
      color: #fff;
    }

    #unity-warning .warning {
      background: #ffd60a;
      color: #111;
    }

    #fullscreen-button {
      position: fixed;
      right: calc(env(safe-area-inset-right, 0px) + 14px);
      bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      z-index: 30;
      display: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.92);
      color: #111;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
    }

    #fullscreen-button:active {
      transform: scale(0.98);
    }

    #fatal-error {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #000;
      color: #fff;
      text-align: center;
    }

    #fatal-error-box {
      width: min(720px, 100%);
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
    }

    #fatal-error-title {
      margin-bottom: 10px;
      color: #ff5a4f;
      font-size: 22px;
      font-weight: 800;
    }

    #fatal-error-message {
      color: rgba(255, 255, 255, 0.86);
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    @media (display-mode: fullscreen) {
      #fullscreen-button {
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-warning"></div>
  </div>

  <div id="unity-loading-screen">
    <div id="unity-loading-box">
      <div id="unity-title">Qurbani Run</div>

      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>

      <div id="unity-loading-text">Loading game...</div>
    </div>
  </div>

  <button id="fullscreen-button" type="button">
    Fullscreen
  </button>

  <div id="fatal-error">
    <div id="fatal-error-box">
      <div id="fatal-error-title">Game failed to load</div>
      <div id="fatal-error-message"></div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const container = document.querySelector("#unity-container");
    const loadingScreen = document.querySelector("#unity-loading-screen");
    const loadingText = document.querySelector("#unity-loading-text");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const warningBanner = document.querySelector("#unity-warning");
    const fullscreenButton = document.querySelector("#fullscreen-button");
    const fatalError = document.querySelector("#fatal-error");
    const fatalErrorMessage = document.querySelector("#fatal-error-message");

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/v3.loader.js";

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/v3.data.br",
      frameworkUrl: buildUrl + "/v3.framework.js.br",
      codeUrl: buildUrl + "/v3.wasm.br",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Qurbani Run",
      productVersion: "0.1.0",
      showBanner: unityShowBanner
    };

    /*
      Mobile optimization:
      Limits very high DPR screens so WebGL does not render too many pixels.
      This improves performance and can reduce lag on phones.
    */
    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 1.5);
    }

    function resizeGame() {
      const width = window.innerWidth;
      const height = window.innerHeight;

      container.style.width = width + "px";
      container.style.height = height + "px";

      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
    }

    window.addEventListener("resize", resizeGame);
    window.addEventListener("orientationchange", function () {
      setTimeout(resizeGame, 250);
    });

    resizeGame();

    function unityShowBanner(msg, type) {
      function updateBannerVisibility() {
        warningBanner.style.display = warningBanner.children.length ? "block" : "none";
      }

      const div = document.createElement("div");
      div.innerHTML = msg;
      div.className = type === "error" ? "error" : "warning";

      warningBanner.appendChild(div);

      if (type !== "error") {
        setTimeout(function () {
          if (div.parentNode) {
            warningBanner.removeChild(div);
          }
          updateBannerVisibility();
        }, 5000);
      }

      updateBannerVisibility();
    }

    function showFatalError(message) {
      loadingScreen.classList.add("hidden");
      fatalError.style.display = "flex";
      fatalErrorMessage.textContent = message;
    }

    function hideLoadingScreen() {
      loadingScreen.classList.add("hidden");
    }

    function focusGame() {
      try {
        canvas.focus();
      } catch (error) {
        // Ignore focus errors.
      }
    }

    function requestBrowserFullscreen() {
      const target = document.documentElement;

      if (!document.fullscreenElement && target.requestFullscreen) {
        target.requestFullscreen().catch(function () {
          // Browser may block fullscreen without direct user action.
        });
      }

      focusGame();
    }

    fullscreenButton.addEventListener("click", requestBrowserFullscreen);

    window.addEventListener("click", focusGame);
    window.addEventListener("touchstart", focusGame, { passive: true });

    function loadUnity() {
      loadingText.textContent = "Loading Unity engine...";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.async = true;

      script.onload = function () {
        if (typeof createUnityInstance !== "function") {
          showFatalError(
            "Unity loader loaded, but createUnityInstance was not found.\n\nCheck that Build/v3.loader.js is the real Unity loader file and not a Git LFS pointer."
          );
          return;
        }

        loadingText.textContent = "Loading game files...";

        createUnityInstance(canvas, config, function (progress) {
          const percent = Math.round(progress * 100);
          progressBarFull.style.width = percent + "%";
          loadingText.textContent = "Loading game... " + percent + "%";
        })
          .then(function (unityInstance) {
            hideLoadingScreen();
            focusGame();

            fullscreenButton.style.display = "block";

            fullscreenButton.onclick = function () {
              if (unityInstance && typeof unityInstance.SetFullscreen === "function") {
                unityInstance.SetFullscreen(1);
              } else {
                requestBrowserFullscreen();
              }

              focusGame();
            };
          })
          .catch(function (error) {
            const msg = String(error || "");

            if (
              msg.includes("Unable to parse") ||
              msg.includes("corrupt") ||
              msg.includes("compression") ||
              msg.includes("Content-Encoding")
            ) {
              showFatalError(
                "Unity build compression error.\n\nYour files are .br files, so the server must send Content-Encoding: br.\n\nCheck your vercel.json headers for:\n- v3.data.br\n- v3.framework.js.br\n- v3.wasm.br\n\nOriginal error:\n" + msg
              );
              return;
            }

            showFatalError("Unity failed to start.\n\n" + msg);
          });
      };

      script.onerror = function () {
        showFatalError(
          "Could not load Unity loader file:\n" +
          loaderUrl +
          "\n\nCheck that the file exists in the Build folder."
        );
      };

      document.body.appendChild(script);
    }

    loadUnity();
  </script>
</body>
</html>
